<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>ReneBoost — MLBB Boost</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;
  --border:#2a2a3a;--border2:#3a3a4f;
  --text:#f0f0f5;--text2:#a0a0b5;--text3:#6a6a80;
  --accent:#c0a0ff;--accent2:#8060e0;--gold:#ffd060;
  --red:#ff4060;--green:#40d080;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
#app{max-width:420px;margin:0 auto;padding-bottom:2rem}

.lang-bar{display:flex;justify-content:flex-end;padding:12px 16px 0;gap:6px}
.lang-btn{background:none;border:0.5px solid var(--border2);color:var(--text2);font-size:11px;font-family:'Inter',sans-serif;padding:4px 10px;border-radius:20px;cursor:pointer;transition:.2s}
.lang-btn.active{border-color:var(--accent);color:var(--accent)}

.hero{padding:20px 16px 16px;text-align:center}
.logo{font-family:'Orbitron',monospace;font-size:26px;font-weight:700;letter-spacing:2px;color:var(--text)}
.logo span{color:var(--accent)}
.hero-badge{display:inline-block;background:var(--bg3);border:0.5px solid var(--accent2);color:var(--accent);font-size:11px;padding:4px 12px;border-radius:20px;margin:8px 0;letter-spacing:.5px}
.hero-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-top:6px}

.trust-row{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none}
.trust-row::-webkit-scrollbar{display:none}
.trust-item{flex-shrink:0;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:8px 12px;text-align:center;min-width:88px}
.trust-num{font-size:16px;font-weight:600;color:var(--accent);font-family:'Orbitron',monospace}
.trust-label{font-size:10px;color:var(--text3);margin-top:2px}

.section-title{font-size:11px;font-weight:600;color:var(--text3);padding:0 16px 10px;letter-spacing:1.5px;text-transform:uppercase}

.why-box{margin:0 16px 16px;background:var(--bg3);border:0.5px solid var(--border);border-radius:14px;padding:14px}
.why-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.why-row+.why-row{border-top:0.5px solid var(--border)}
.why-icon{width:32px;height:32px;border-radius:8px;background:var(--bg4);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.why-text{font-size:13px;color:var(--text2);line-height:1.4}
.why-text strong{color:var(--text);font-weight:500}

.tiers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.tier-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;user-select:none}
.tier-card:active{transform:scale(0.97)}
.tier-card.selected{border-color:var(--accent2);background:var(--bg4)}
.tier-icon{width:44px;height:44px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.tier-icon svg{width:100%;height:100%}
.tier-name{font-size:11px;font-weight:600;text-align:center;letter-spacing:.5px;text-transform:uppercase}
.tier-range{font-size:10px;text-align:center;color:var(--text3);margin-top:2px;line-height:1.3}
.tier-price-badge{position:absolute;top:8px;right:8px;background:var(--bg);border:0.5px solid var(--border2);border-radius:8px;padding:3px 7px;font-size:10px;font-family:'Orbitron',monospace;color:var(--gold)}

.detail-panel{margin:0 16px 16px;background:var(--bg3);border:0.5px solid var(--accent2);border-radius:14px;padding:16px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.detail-icon{width:52px;height:52px;flex-shrink:0}
.detail-icon svg{width:100%;height:100%}
.detail-title{font-size:15px;font-weight:600}
.detail-subtitle{font-size:12px;color:var(--accent);margin-top:2px}
.detail-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.detail-rows{border-top:0.5px solid var(--border);padding-top:12px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.detail-row+.detail-row{border-top:0.5px solid var(--border)}
.detail-key{font-size:12px;color:var(--text3)}
.detail-val{font-size:13px;color:var(--text);font-weight:500}
.detail-val.gold{color:var(--gold);font-family:'Orbitron',monospace}
.detail-val.green{color:var(--green)}
.order-btn{width:100%;margin-top:14px;padding:13px;background:linear-gradient(135deg,var(--accent2),#a080ff);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.5px;transition:.15s}
.order-btn:active{transform:scale(0.98);opacity:.9}

.reviews-section{padding:0 16px 16px}
.review-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.review-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.review-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg4);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);font-weight:600;flex-shrink:0}
.review-name{font-size:12px;font-weight:500}
.review-rank{font-size:10px;color:var(--text3);margin-top:1px}
.review-stars{margin-left:auto;font-size:12px;color:var(--gold);letter-spacing:1px}
.review-text{font-size:12px;color:var(--text2);line-height:1.5}

.footer{text-align:center;padding:16px;border-top:0.5px solid var(--border)}
.footer-logo{font-family:'Orbitron',monospace;font-size:13px;color:var(--text3);letter-spacing:2px}
.footer-sub{font-size:10px;color:var(--text3);margin-top:4px}

.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('ru')" id="btn-ru">RU</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
  </div>

  <div class="hero">
    <div class="logo">Rene<span>Boost</span></div>
    <div class="hero-badge" id="hero-badge"></div>
    <div class="hero-desc" id="hero-desc"></div>
  </div>

  <div class="trust-row">
    <div class="trust-item"><div class="trust-num">2400+</div><div class="trust-label" id="t-clients"></div></div>
    <div class="trust-item"><div class="trust-num">4.98</div><div class="trust-label" id="t-rating"></div></div>
    <div class="trust-item"><div class="trust-num">24h</div><div class="trust-label" id="t-support"></div></div>
    <div class="trust-item"><div class="trust-num">100%</div><div class="trust-label" id="t-safe"></div></div>
  </div>

  <div class="section-title" id="why-title"></div>
  <div class="why-box">
    <div class="why-row"><div class="why-icon">🏆</div><div class="why-text"><strong id="w1h"></strong><br><span id="w1b"></span></div></div>
    <div class="why-row"><div class="why-icon">🔐</div><div class="why-text"><strong id="w2h"></strong><br><span id="w2b"></span></div></div>
    <div class="why-row"><div class="why-icon">⚡</div><div class="why-text"><strong id="w3h"></strong><br><span id="w3b"></span></div></div>
    <div class="why-row"><div class="why-icon">⭐</div><div class="why-text"><strong id="w4h"></strong><br><span id="w4b"></span></div></div>
  </div>

  <div class="section-title" id="boost-title"></div>
  <div class="tiers-grid" id="tiers-grid"></div>

  <div id="detail-panel" class="hidden"></div>

  <div class="section-title" id="review-title"></div>
  <div class="reviews-section" id="reviews-section"></div>

  <div class="footer">
    <div class="footer-logo">RENEBOOST</div>
    <div class="footer-sub" id="footer-sub"></div>
  </div>
</div>

<script>
const ICONS={
  warrior:`<svg viewBox="0 0 44 44" fill="none"><polygon points="22,4 38,14 38,30 22,40 6,30 6,14" fill="#1a1a2a" stroke="#60a0ff" stroke-width="1.5"/><polygon points="22,10 32,16 32,28 22,34 12,28 12,16" fill="#0a0a18" stroke="#60a0ff" stroke-width="1"/><text x="22" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#60a0ff" font-family="Orbitron,sans-serif">W</text></svg>`,
  epic:`<svg viewBox="0 0 44 44" fill="none"><polygon points="22,4 38,14 38,30 22,40 6,30 6,14" fill="#1a0a2a" stroke="#c060ff" stroke-width="1.5"/><polygon points="22,10 32,16 32,28 22,34 12,28 12,16" fill="#0a0014" stroke="#c060ff" stroke-width="1"/><text x="22" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#c060ff" font-family="Orbitron,sans-serif">EP</text></svg>`,
  myth:`<svg viewBox="0 0 44 44" fill="none"><polygon points="22,2 40,12 40,32 22,42 4,32 4,12" fill="#1a0a00" stroke="#ff9030" stroke-width="1.5"/><polygon points="22,8 34,15 34,29 22,36 10,29 10,15" fill="#0a0500" stroke="#ff9030" stroke-width="1"/><text x="22" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="#ff9030" font-family="Orbitron,sans-serif">MY</text></svg>`,
  honor:`<svg viewBox="0 0 44 44" fill="none"><polygon points="22,2 42,13 42,31 22,42 2,31 2,13" fill="#1a0005" stroke="#ff4060" stroke-width="1.5"/><polygon points="22,8 36,15 36,29 22,36 8,29 8,15" fill="#0a0003" stroke="#ff4060" stroke-width="1"/><text x="22" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="#ff4060" font-family="Orbitron,sans-serif">HN</text></svg>`,
  glory:`<svg viewBox="0 0 44 44" fill="none"><polygon points="22,2 42,13 42,31 22,42 2,31 2,13" fill="#1a1400" stroke="#ffd060" stroke-width="2"/><polygon points="22,8 36,15 36,29 22,36 8,29 8,15" fill="#0a0800" stroke="#ffd060" stroke-width="1"/><circle cx="22" cy="22" r="4" fill="#ffd060" opacity=".3"/><text x="22" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="#ffd060" font-family="Orbitron,sans-serif">GL</text></svg>`
};

const T={
  ru:{
    badge:"🔒 Безопасно · Проверено · Быстро",
    desc:"Профессиональный буст аккаунта в Mobile Legends Bang Bang. Оплата через Telegram Stars или донат.",
    whyTitle:"ПОЧЕМУ МЫ",boostTitle:"ВЫБЕРИ БУСТ",reviewTitle:"ОТЗЫВЫ",
    clients:"клиентов",rating:"рейтинг",support:"поддержка",safe:"безопасно",
    w1h:"Застрял в ранге?",w1b:"Не хватает пары звёзд — мы знаем как вырваться вперёд.",
    w2h:"Полная безопасность",w2b:"Работаем аккуратно, без риска бана. Тысячи довольных клиентов.",
    w3h:"Быстрый результат",w3b:"Начинаем в течение часа после подтверждения заказа.",
    w4h:"Только живые отзывы",w4b:"Звёзды от реальных клиентов, которые уже взяли буст.",
    orderBtn:"Заказать буст →",footerSub:"© 2025 · Telegram Bot · MLBB Boost",
    dl:{payment:"Оплата",duration:"Срок",guarantee:"Гарантия",yes:"Есть ✓"},
    tiers:[
      {id:"warrior",name:"Воин",range:"Воин → Грандмастер",price:"299",icon:"warrior",color:"#60a0ff",desc:"Идеально для новичков. Поднимем с Воина до Грандмастера быстро и надёжно.",duration:"1–2 дня"},
      {id:"epic",name:"Эпик",range:"Эпик → Легенда",price:"599",icon:"epic",color:"#c060ff",desc:"Пробьём сложный барьер эпик-лиги и выведем в Легенду.",duration:"2–3 дня"},
      {id:"myth",name:"Миф",range:"Миф → Миф Честь",price:"999",icon:"myth",color:"#ff9030",desc:"Элитный буст до заветной Миф Чести. Работают топовые игроки.",duration:"3–5 дней"},
      {id:"honor",name:"Честь",range:"Миф Честь → Миф Слава",price:"1499",icon:"honor",color:"#ff4060",desc:"Престижный переход от Чести к Славе. Для самых амбициозных.",duration:"5–7 дней"},
      {id:"glory",name:"Слава",range:"Миф Слава → 1000 ★",price:"2499",icon:"glory",color:"#ffd060",desc:"Топ 1000 звёзд Мифа — элита сервера. Только лучшие бустеры.",duration:"7–14 дней"}
    ],
    reviews:[
      {name:"Arman K.",rank:"Эпик → Легенда",stars:5,text:"Взял буст с Эпика до Легенды. Всё прошло за 2 дня, аккаунт цел. Рекомендую!"},
      {name:"Sofia M.",rank:"Миф → Миф Честь",stars:5,text:"Боялась, но всё честно. Миф Честь получила, поддержка отвечала быстро. Буду снова."},
      {name:"Denis P.",rank:"Воин → Грандмастер",stars:5,text:"Топ сервис. Поддержка отвечает быстро, буст сделали раньше срока. 10/10"}
    ]
  },
  en:{
    badge:"🔒 Safe · Verified · Fast",
    desc:"Professional account boosting in Mobile Legends Bang Bang. Pay with Telegram Stars or donation.",
    whyTitle:"WHY US",boostTitle:"CHOOSE BOOST",reviewTitle:"REVIEWS",
    clients:"clients",rating:"rating",support:"support",safe:"safe",
    w1h:"Stuck in rank?",w1b:"A few stars short of promotion — we know how to break through.",
    w2h:"Full safety",w2b:"We work carefully, no ban risk. Thousands of happy clients.",
    w3h:"Fast results",w3b:"We start within an hour of order confirmation.",
    w4h:"Real reviews only",w4b:"Stars from actual clients who already got boosted.",
    orderBtn:"Order boost →",footerSub:"© 2025 · Telegram Bot · MLBB Boost",
    dl:{payment:"Payment",duration:"Duration",guarantee:"Guarantee",yes:"Included ✓"},
    tiers:[
      {id:"warrior",name:"Warrior",range:"Warrior → Grand Master",price:"299",icon:"warrior",color:"#60a0ff",desc:"Perfect for beginners. We'll boost from Warrior to Grand Master quickly.",duration:"1–2 days"},
      {id:"epic",name:"Epic",range:"Epic → Legend",price:"599",icon:"epic",color:"#c060ff",desc:"Break through the epic league barrier and reach Legend tier.",duration:"2–3 days"},
      {id:"myth",name:"Myth",range:"Myth → Myth Honor",price:"999",icon:"myth",color:"#ff9030",desc:"Elite boost to Myth Honor. Our top players handle this.",duration:"3–5 days"},
      {id:"honor",name:"Honor",range:"Myth Honor → Myth Glory",price:"1499",icon:"honor",color:"#ff4060",desc:"Prestigious move from Honor to Glory. For the most ambitious.",duration:"5–7 days"},
      {id:"glory",name:"Glory",range:"Myth Glory → 1000 ★",price:"2499",icon:"glory",color:"#ffd060",desc:"Top 1000 Myth stars — server elite. Only our best boosters.",duration:"7–14 days"}
    ],
    reviews:[
      {name:"Arman K.",rank:"Epic → Legend",stars:5,text:"Got boosted from Epic to Legend in 2 days, account safe. Highly recommend!"},
      {name:"Sofia M.",rank:"Myth → Myth Honor",stars:5,text:"Was nervous but everything was honest. Got Myth Honor, support was responsive."},
      {name:"Denis P.",rank:"Warrior → Grand Master",stars:5,text:"Top service. Support responds fast, boost done ahead of schedule. 10/10"}
    ]
  }
};

let lang='ru', selected=null;

function setLang(l){
  lang=l;
  document.getElementById('btn-ru').classList.toggle('active',l==='ru');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  render();
}

function render(){
  const t=T[lang];
  document.getElementById('hero-badge').textContent=t.badge;
  document.getElementById('hero-desc').textContent=t.desc;
  document.getElementById('why-title').textContent=t.whyTitle;
  document.getElementById('boost-title').textContent=t.boostTitle;
  document.getElementById('review-title').textContent=t.reviewTitle;
  document.getElementById('t-clients').textContent=t.clients;
  document.getElementById('t-rating').textContent=t.rating;
  document.getElementById('t-support').textContent=t.support;
  document.getElementById('t-safe').textContent=t.safe;
  document.getElementById('w1h').textContent=t.w1h;document.getElementById('w1b').textContent=t.w1b;
  document.getElementById('w2h').textContent=t.w2h;document.getElementById('w2b').textContent=t.w2b;
  document.getElementById('w3h').textContent=t.w3h;document.getElementById('w3b').textContent=t.w3b;
  document.getElementById('w4h').textContent=t.w4h;document.getElementById('w4b').textContent=t.w4b;
  document.getElementById('footer-sub').textContent=t.footerSub;
  renderTiers(); renderDetail(); renderReviews();
}

function renderTiers(){
  const t=T[lang];
  const g=document.getElementById('tiers-grid');
  g.innerHTML='';
  t.tiers.forEach(tier=>{
    const d=document.createElement('div');
    d.className='tier-card'+(selected===tier.id?' selected':'');
    d.innerHTML=`
      <div class="tier-price-badge">${tier.price}⭐</div>
      <div class="tier-icon">${ICONS[tier.icon]}</div>
      <div class="tier-name" style="color:${tier.color}">${tier.name}</div>
      <div class="tier-range">${tier.range}</div>`;
    d.onclick=()=>{selected=selected===tier.id?null:tier.id;renderTiers();renderDetail();};
    g.appendChild(d);
  });
}

function renderDetail(){
  const panel=document.getElementById('detail-panel');
  if(!selected){panel.classList.add('hidden');return;}
  const t=T[lang];
  const tier=t.tiers.find(x=>x.id===selected);
  panel.classList.remove('hidden');
  panel.innerHTML=`
    <div class="detail-header">
      <div class="detail-icon">${ICONS[tier.icon]}</div>
      <div><div class="detail-title" style="color:${tier.color}">${tier.name}</div>
      <div class="detail-subtitle">${tier.range}</div></div>
    </div>
    <div class="detail-desc">${tier.desc}</div>
    <div class="detail-rows">
      <div class="detail-row"><span class="detail-key">${t.dl.payment}</span><span class="detail-val gold">${tier.price} ⭐</span></div>
      <div class="detail-row"><span class="detail-key">${t.dl.duration}</span><span class="detail-val">${tier.duration}</span></div>
      <div class="detail-row"><span class="detail-key">${t.dl.guarantee}</span><span class="detail-val green">${t.dl.yes}</span></div>
    </div>
    <button class="order-btn" onclick="orderBoost('${tier.id}')">${t.orderBtn}</button>`;
}

function renderReviews(){
  const t=T[lang];
  const s=document.getElementById('reviews-section');
  s.innerHTML='';
  t.reviews.forEach(r=>{
    const d=document.createElement('div');
    d.className='review-card';
    d.innerHTML=`
      <div class="review-top">
        <div class="review-avatar">${r.name.split(' ').map(x=>x[0]).join('')}</div>
        <div><div class="review-name">${r.name}</div><div class="review-rank">${r.rank}</div></div>
        <div class="review-stars">${'★'.repeat(r.stars)}</div>
      </div>
      <div class="review-text">${r.text}</div>`;
    s.appendChild(d);
  });
}

function orderBoost(id){
  const t=T[lang];
  const tier=t.tiers.find(x=>x.id===id);
  const payload=JSON.stringify({action:'order',tier:id,name:tier.name,range:tier.range,price:tier.price,lang});
  if(window.Telegram&&window.Telegram.WebApp&&window.Telegram.WebApp.sendData){
    window.Telegram.WebApp.sendData(payload);
  } else {
    alert('Открой через Telegram бота для оформления заказа!');
  }
}

const tg=window.Telegram&&window.Telegram.WebApp;
if(tg){tg.ready();tg.expand();}

render();
</script>
</body>
</html>
